<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚡ Robot Punk Name Generator</title>

<meta name="description" content="Viral Name Generator cyberpunk untuk FF, ML, Anime, TikTok. Nama keren, aesthetic dan unik gratis.">

<style>

/* ===== CYBERPUNK BACKGROUND ===== */
body{
margin:0;
font-family: Arial;
color:white;
background:
radial-gradient(circle at 20% 20%, #ff00ff33, transparent 40%),
radial-gradient(circle at 80% 30%, #00ffff33, transparent 40%),
radial-gradient(circle at 50% 80%, #8000ff33, transparent 40%),
#0a0a0f;
overflow-x:hidden;
}

/* glow grid */
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:
linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* container */
.container{
max-width:850px;
margin:auto;
padding:20px;
}

/* HEADER */
h1{
text-align:center;
font-size:32px;
text-shadow:0 0 10px #ff00ff,0 0 20px #00ffff;
}

/* BUTTON */
button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

/* neon buttons */
.gen{background:#00ff88}
.copy{background:#00b0ff}
.wa{background:#ff3d00}
.multi{background:#b300ff}
.mode{background:#111;border:1px solid #ff00ff;color:white}

/* RESULT BOX */
.result{
margin-top:20px;
padding:20px;
background:rgba(0,0,0,0.6);
border:1px solid #ff00ff;
border-radius:15px;
text-align:center;
font-size:22px;
box-shadow:0 0 15px #ff00ff44;
min-height:50px;
}

/* HISTORY */
.history{
margin-top:20px;
padding:10px;
background:rgba(0,0,0,0.5);
border:1px solid #00ffff55;
border-radius:10px;
max-height:200px;
overflow:auto;
}

/* small glow text */
.glow{
text-shadow:0 0 10px #00ffff;
}

/* footer */
.footer{
text-align:center;
margin-top:30px;
opacity:0.7;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<h1>🤖⚡ ROBOT PUNK NAME GENERATOR</h1>

<!-- MODE -->
<div style="text-align:center">
<button class="mode" onclick="setMode('ff')">🔥 FF MODE</button>
<button class="mode" onclick="setMode('ml')">⚔️ ML MODE</button>
<button class="mode" onclick="setMode('anime')">🎌 ANIME MODE</button>
</div>

<!-- ACTION -->
<div style="text-align:center;margin-top:10px">
<button class="gen" onclick="generate()">GENERATE</button>
<button class="multi" onclick="generate10()">GENERATE 10X</button>
<button class="copy" onclick="copyText()">COPY</button>
<button class="wa" onclick="shareWA()">SHARE WA</button>
</div>

<div class="result" id="hasil">Klik Generate ⚡</div>

<div class="history" id="history">
<b>📜 HISTORY</b>
</div>

<div class="footer">
© 2026 Robot Punk Generator • Cyber UI Edition
</div>

</div>

<script>

let mode = "ff";
let last = "";

const data = {
ff:["Shadow","Dark","Ghost","Night","Alpha","Fire","Ice","Storm","Blade","Toxic","Cyber","Death"],
ml:["King","Queen","Lord","Hero","Legend","Warrior","Assassin","Mage","Tank","Demon"],
anime:["Gojo","Naruto","Luffy","Zoro","Itachi","Sasuke","Madara","Levi","Eren","Kakashi"]
};

const symbol = ["⚡","々","✧","☠","★","〆","ツ","⛧"];

function setMode(m){
mode = m;
alert("Mode: " + m.toUpperCase());
}

function rand(arr){
return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){

let a = rand(data[mode]);
let b = rand(data[mode]);

while(a === b){
b = rand(data[mode]);
}

let s = rand(symbol);
let n = Math.floor(Math.random()*9999);

last = `『${a}${b}』${s}${n}`;

document.getElementById("hasil").innerText = last;

saveHistory(last);
}

function generate10(){

let text = "";

for(let i=0;i<10;i++){
let a = rand(data[mode]);
let b = rand(data[mode]);
let s = rand(symbol);
let n = Math.floor(Math.random()*9999);

text += `『${a}${b}』${s}${n}\n`;
}

last = text;
document.getElementById("hasil").innerText = text;

saveHistory("Generate 10x");
}

function copyText(){
if(!last) return alert("Generate dulu!");

navigator.clipboard.writeText(last);
alert("Copied!");
}

function shareWA(){
if(!last) return alert("Generate dulu!");

window.open("https://wa.me/?text=" + encodeURIComponent(last));
}

/* ===== HISTORY (LOCAL STORAGE) ===== */
function saveHistory(val){
let h = JSON.parse(localStorage.getItem("history") || "[]");

h.unshift(val);
if(h.length > 15) h.pop();

localStorage.setItem("history", JSON.stringify(h));

renderHistory();
}

function renderHistory(){
let h = JSON.parse(localStorage.getItem("history") || "[]");

let html = "<b>📜 HISTORY</b><br><br>";

h.forEach(x=>{
html += `<div>⚡ ${x}</div>`;
});

document.getElementById("history").innerHTML = html;
}

renderHistory();

</script>

</body>
</html>
